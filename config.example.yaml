api:
  base_url: https://api.deepseek.com
  api_key: YOUR_API_KEY_HERE
  timeout: 120
  max_retries: 3
  max_tokens: 320000

runtime:
  workers: 4
  log_level: INFO

cleaning:
  model: deepseek-v4-flash
  prompt: ./prompts/cleaner.md
  batch_size: 3
  context_pages: 1

translation:
  model: deepseek-v4-pro
  prompt: ./prompts/translator.md
  glossary: ./glossary.csv
  rules: ./rules.txt
  max_tokens: 120000

latex:
  template: ./book.tex             # 可选；未设置则跳过 latex 阶段
